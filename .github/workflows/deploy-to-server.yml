# thsi will deploy the safe / secure / tested app to Prod server
name: Deploy To Server

on:
    workflow_call:

jobs:
    deploy:
        runs-on: ubuntu-latest 
        steps:
            - name: SSH to Prod Server & create app folder
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.EC2_SSH_HOST }}
                username: ${{ secrets.EC2_SSH_USERNAME }}
                key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
                script: |
                    echo "Starting Deployment"
                    mkdir -p devops

            - name: Copy the docker-compose file
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.EC2_SSH_HOST }}
                username: ${{ secrets.EC2_SSH_USERNAME }}
                key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
                source: "docker-compose.yml"
                target: ~/devops

            - name: SSH to Prod Server & run the app
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.EC2_SSH_HOST }}
                username: ${{ secrets.EC2_SSH_USERNAME }}
                key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
                script: |
                    echo "Running App"

                    sudo apt-get update
                    sudo apt-get install -y docker.io docker-compose

                    echo "${{ secrets.DOCKERHUB_TOKEN }}" | sudo docker login \
                        -u "${{ vars.DOCKERHUB_USERNAME }}" \
                        --password-stdin

                    cd ~/devops

                    sudo docker compose pull
                    sudo docker compose down
                    sudo docker compose up -d
